<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='96' fill='%230a0a0f'/%3E%3Crect x='60' y='60' width='180' height='180' rx='28' fill='%236c5ce7' opacity='0.9'/%3E%3Crect x='272' y='60' width='180' height='80' rx='28' fill='%236c5ce7' opacity='0.6'/%3E%3Crect x='272' y='168' width='180' height='72' rx='28' fill='%236c5ce7' opacity='0.4'/%3E%3Crect x='60' y='272' width='120' height='180' rx='28' fill='%236c5ce7' opacity='0.5'/%3E%3Crect x='208' y='272' width='244' height='180' rx='28' fill='%236c5ce7' opacity='0.7'/%3E%3C/svg%3E">
  <link rel="manifest" href="/manifest.json">
  <title>BenDash</title>
  <link rel="stylesheet" href="/style.css">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body x-data="dashboard()" x-init="init()" :class="editMode && 'edit-mode-active'">

  <!-- Edit Mode Banner -->
  <div class="edit-banner" x-show="editMode" x-transition style="display:none;">
    <span class="edit-banner-text">Edit Mode</span>
    <button @click="exitEditMode()" class="edit-banner-done">Done</button>
  </div>

  <!-- Search Bar -->
  <header class="search-header">
    <div class="search-container">
      <a href="/" class="header-logo">
        <img src="/icon.svg" alt="BenDash" class="header-logo-icon">
        <span class="header-logo-text">BenDash</span>
      </a>
      <div class="search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
        <form :action="searchEngine === 'google' ? 'https://www.google.com/search' : 'https://gemini.google.com/app'" method="GET" target="_blank" class="search-form" @submit="handleSearch($event)">
          <input
            type="text"
            :name="searchEngine === 'google' ? 'q' : ''"
            x-ref="searchInput"
            placeholder="Search the web..."
            class="search-input"
            @keydown.slash.window.prevent="$refs.searchInput.focus()"
            @keydown.ctrl.k.window.prevent="$refs.searchInput.focus()"
          >
        </form>
        <button @click="toggleSearchEngine()" class="engine-toggle" :title="'Search with ' + searchEngine">
          <span x-show="searchEngine === 'google'" class="engine-label">G</span>
          <span x-show="searchEngine === 'gemini'" class="engine-label gemini">✦</span>
        </button>
      </div>
      <button @click="enterEditMode()" class="edit-toggle-btn" title="Edit Mode" x-show="!editMode">
        <span>✏️</span>
      </button>
    </div>
  </header>

  <!-- Dashboard Grid -->
  <main class="dashboard-grid">

    <!-- Weather + Clock -->
    <section class="card weather-card" data-widget-id="weather">
      <div class="card-header">
        <span class="drag-handle" x-show="editMode">⠿</span>
        <span class="card-icon">🌤️</span>
        <h2 class="card-title">Weather & Clock</h2>
      </div>
      <div class="card-body">
        <div class="clock" x-data="clock()" x-init="startClock()">
          <div class="clock-time" x-text="time"></div>
          <div class="clock-date" x-text="date"></div>
        </div>
        <template x-if="weather.loading">
          <div class="skeleton-group">
            <div class="skeleton skeleton-lg"></div>
            <div class="skeleton skeleton-md"></div>
          </div>
        </template>
        <template x-if="!weather.loading && weather.data">
          <div class="weather-content">
            <div class="weather-current">
              <span class="weather-temp" x-text="weather.data.current.temp + '°C'"></span>
              <span class="weather-icon" x-html="getWeatherSVG(weather.data.current.weatherCode)"></span>
            </div>
            <div class="weather-details">
              <span>Feels like <span x-text="weather.data.current.feelsLike + '°C'"></span></span>
              <span>💧 <span x-text="weather.data.current.humidity + '%'"></span></span>
              <span>💨 <span x-text="weather.data.current.windSpeed + ' km/h'"></span></span>
            </div>
            <div class="forecast">
              <template x-for="day in weather.data.daily.slice(1)" :key="day.date">
                <div class="forecast-day">
                  <span class="forecast-date" x-text="formatDay(day.date)"></span>
                  <span class="forecast-icon" x-html="getWeatherSVG(day.weatherCode, 24)"></span>
                  <span class="forecast-temps">
                    <span class="temp-max" x-text="Math.round(day.maxTemp) + '°'"></span>
                    <span class="temp-min" x-text="Math.round(day.minTemp) + '°'"></span>
                  </span>
                </div>
              </template>
            </div>
          </div>
        </template>
        <template x-if="!weather.loading && weather.error">
          <div class="error-state">
            <p x-text="weather.error"></p>
            <button @click="fetchWeather()" class="retry-btn">Retry</button>
          </div>
        </template>
      </div>
    </section>

    <!-- Stocks -->
    <section class="card stocks-card" data-widget-id="stocks">
      <div class="card-header">
        <span class="drag-handle" x-show="editMode">⠿</span>
        <span class="card-icon">📊</span>
        <h2 class="card-title">Stocks</h2>
        <button @click="showStockModal = true" class="card-action-btn" title="Add stock" x-show="editMode">+</button>
      </div>
      <div class="card-body">
        <template x-if="stocks.loading">
          <div class="skeleton-group">
            <template x-for="i in 4" :key="i"><div class="skeleton skeleton-sm"></div></template>
          </div>
        </template>
        <template x-if="!stocks.loading">
          <div class="stocks-grid">
            <template x-for="stock in stocks.data" :key="stock.symbol">
              <div class="stock-item">
                <div class="stock-header">
                  <span class="stock-symbol" x-text="stock.symbol"></span>
                  <button x-show="editMode" @click="deleteStock(stock.symbol)" class="delete-btn" title="Remove">×</button>
                </div>
                <div class="stock-price" x-text="stock.error ? '—' : ('$' + stock.price?.toFixed(2))"></div>
                <div class="stock-change" :class="stock.change >= 0 ? 'positive' : 'negative'"
                  x-text="stock.error ? stock.error : ((stock.change >= 0 ? '+' : '') + stock.change?.toFixed(2) + ' (' + stock.changePercent?.toFixed(2) + '%)')">
                </div>
                <template x-if="stock.history && stock.history.length > 1">
                  <svg class="stock-sparkline" :width="120" :height="40" viewBox="0 0 120 40" preserveAspectRatio="none">
                    <polyline
                      :points="sparklinePath(stock.history, 120, 40)"
                      fill="none"
                      :stroke="stock.history[stock.history.length-1] >= stock.history[0] ? 'var(--green)' : 'var(--red)'"
                      stroke-width="1.5"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                  </svg>
                </template>
              </div>
            </template>
          </div>
        </template>
      </div>
    </section>

    <!-- RSS Feed -->
    <section class="card rss-card" data-widget-id="rss">
      <div class="card-header">
        <span class="drag-handle" x-show="editMode">⠿</span>
        <span class="card-icon">📰</span>
        <h2 class="card-title">Hebits Feed</h2>
      </div>
      <div class="card-body rss-body">
        <template x-if="rss.loading">
          <div class="skeleton-group">
            <template x-for="i in 5" :key="i"><div class="skeleton skeleton-md"></div></template>
          </div>
        </template>
        <template x-if="!rss.loading">
          <div class="rss-list">
            <template x-for="item in rss.data" :key="item.link">
              <a :href="item.link" target="_blank" rel="noopener" class="rss-item" dir="auto">
                <div class="rss-item-header">
                  <div class="rss-badges">
                    <span class="rss-category" :class="'cat-' + (item.parsedCategory || '').toLowerCase()" x-show="item.parsedCategory" x-text="item.parsedCategory"></span>
                    <span class="rss-quality" :class="item.quality?.includes('4K') || item.quality?.includes('2160p') ? 'quality-4k' : 'quality-hd'" x-show="item.quality" x-text="item.quality"></span>
                    <span class="rss-source-badge" x-show="item.source" x-text="item.source"></span>
                  </div>
                  <span class="rss-time" x-text="timeAgo(item.pubDate)"></span>
                </div>
                <h3 class="rss-title" x-text="item.hebrewName || item.title"></h3>
                <p class="rss-language" x-show="item.language" x-text="item.language"></p>
                <p class="rss-description" x-text="item.description?.substring(0, 120) + (item.description?.length > 120 ? '...' : '')"></p>
                <p class="rss-release" x-show="item.releaseName" x-text="item.releaseName"></p>
              </a>
            </template>
          </div>
        </template>
        <template x-if="!rss.loading && rss.error">
          <div class="error-state">
            <p x-text="rss.error"></p>
            <button @click="fetchRSS()" class="retry-btn">Retry</button>
          </div>
        </template>
      </div>
    </section>

    <!-- Bookmarks -->
    <section class="card bookmarks-card" data-widget-id="bookmarks">
      <div class="card-header">
        <span class="drag-handle" x-show="editMode">⠿</span>
        <span class="card-icon">🔖</span>
        <h2 class="card-title">Bookmarks</h2>
        <button @click="showBookmarkModal = true" class="card-action-btn" title="Add bookmark" x-show="editMode">+</button>
      </div>
      <div class="card-body">
        <template x-if="bookmarks.loading">
          <div class="skeleton-group skeleton-grid">
            <template x-for="i in 6" :key="i"><div class="skeleton skeleton-square"></div></template>
          </div>
        </template>
        <template x-if="!bookmarks.loading">
          <div class="bookmarks-grid" x-ref="bookmarksGrid">
            <template x-for="bm in bookmarks.data" :key="bm.id">
              <a :href="editMode ? 'javascript:void(0)' : bm.url" :target="editMode ? '' : '_blank'" rel="noopener" class="bookmark-item" :data-id="bm.id">
                <img :src="bm.icon" :alt="bm.name" class="bookmark-icon" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%236c5ce7%22 width=%22100%22 height=%22100%22 rx=%2220%22/><text x=%2250%22 y=%2268%22 font-size=%2250%22 text-anchor=%22middle%22 fill=%22white%22>' + bm.name?.charAt(0)?.toUpperCase() + '</text></svg>'; this.onerror=null">
                <span class="bookmark-name" x-text="bm.name"></span>
                <button x-show="editMode" @click.prevent.stop="deleteBookmark(bm.id)" class="bookmark-delete" title="Remove">×</button>
              </a>
            </template>
          </div>
        </template>
      </div>
    </section>

    <!-- Services -->
    <section class="card services-card" data-widget-id="services">
      <div class="card-header">
        <span class="drag-handle" x-show="editMode">⠿</span>
        <span class="card-icon">🖥️</span>
        <h2 class="card-title">Services</h2>
        <button @click="showServiceModal = true" class="card-action-btn" title="Add service" x-show="editMode">+</button>
        <span class="services-count" x-show="!services.loading">
          <span class="dot dot-green"></span>
          <span x-text="services.data.filter(s => s.online).length + '/' + services.data.length"></span>
        </span>
      </div>
      <div class="card-body">
        <template x-if="services.loading">
          <div class="skeleton-group skeleton-grid">
            <template x-for="i in 6" :key="i"><div class="skeleton skeleton-square"></div></template>
          </div>
        </template>
        <template x-if="!services.loading">
          <div class="services-grid" x-ref="servicesGrid">
            <template x-for="svc in services.data" :key="svc.id || svc.name">
              <a :href="editMode ? 'javascript:void(0)' : svc.url" :target="editMode ? '' : '_blank'" rel="noopener" class="service-item" :data-id="svc.id">
                <span class="service-icon" x-text="svc.icon"></span>
                <span class="service-name" x-text="svc.name"></span>
                <template x-if="editMode">
                  <button @click.prevent.stop="deleteService(svc.id)" class="service-delete" title="Remove">×</button>
                </template>
                <template x-if="!editMode">
                  <span class="dot" :class="svc.online ? 'dot-green' : 'dot-red'"></span>
                </template>
              </a>
            </template>
          </div>
        </template>
      </div>
    </section>

    <!-- qBittorrent -->
    <section class="card qbit-card" data-widget-id="qbit" x-data="{
      qbit: { loading: true, data: null },
      async fetchQbit() {
        try {
          const r = await fetch('/api/qbit/summary');
          this.qbit.data = await r.json();
        } catch(e) { console.error('qbit error:', e); }
        this.qbit.loading = false;
      }
    }" x-init="fetchQbit(); setInterval(() => fetchQbit(), 30000)">
      <div class="card-header">
        <span class="drag-handle" x-show="editMode">⠿</span>
        <span class="card-icon">⬇️</span>
        <h2 class="card-title">Downloads</h2>
      </div>
      <div class="card-body">
        <template x-if="qbit.loading">
          <div class="skeleton-group">
            <div class="skeleton skeleton-md"></div>
            <div class="skeleton skeleton-sm"></div>
          </div>
        </template>
        <template x-if="!qbit.loading && qbit.data && qbit.data.connected">
          <div>
            <!-- Compact idle view -->
            <div class="qbit-compact" x-show="qbit.data.downloadSpeed === '0 B/s' && qbit.data.downloading === 0">
              <span class="qbit-idle-text">No active downloads</span>
              <span class="qbit-idle-sep">&middot;</span>
              <span x-text="qbit.data.seeding + ' seeding'"></span>
              <span class="qbit-idle-sep">&middot;</span>
              <span>⬇ <span x-text="qbit.data.totalDownloaded"></span></span>
              <span>⬆ <span x-text="qbit.data.totalUploaded"></span></span>
            </div>
            <!-- Expanded active view -->
            <div class="qbit-content" x-show="qbit.data.downloadSpeed !== '0 B/s' || qbit.data.downloading > 0">
              <div class="qbit-speeds">
                <div class="qbit-speed">
                  <span class="qbit-arrow down">↓</span>
                  <span class="qbit-speed-value qbit-speed-active" x-text="qbit.data.downloadSpeed"></span>
                </div>
                <div class="qbit-speed">
                  <span class="qbit-arrow up">↑</span>
                  <span class="qbit-speed-value" x-text="qbit.data.uploadSpeed"></span>
                </div>
              </div>
              <div class="qbit-counts">
                <span class="qbit-count"><span class="qbit-count-num" x-text="qbit.data.downloading"></span> downloading</span>
                <span class="qbit-count"><span class="qbit-count-num" x-text="qbit.data.seeding"></span> seeding</span>
                <span class="qbit-count"><span class="qbit-count-num" x-text="qbit.data.paused"></span> paused</span>
              </div>
              <div class="qbit-totals">
                <span>⬇ <span x-text="qbit.data.totalDownloaded"></span></span>
                <span>⬆ <span x-text="qbit.data.totalUploaded"></span></span>
              </div>
            </div>
          </div>
        </template>
        <template x-if="!qbit.loading && qbit.data && !qbit.data.connected">
          <div class="error-state"><p>qBittorrent offline</p></div>
        </template>
      </div>
    </section>

    <!-- TrueNAS -->
    <section class="card truenas-card" data-widget-id="truenas" x-data="{
      nas: { loading: true, data: null, error: null },
      async fetchNAS() {
        try {
          const r = await fetch('/api/truenas/status');
          if (!r.ok) throw new Error('Failed');
          this.nas.data = await r.json();
          this.nas.error = null;
        } catch(e) { this.nas.error = e.message; }
        this.nas.loading = false;
      }
    }" x-init="fetchNAS(); setInterval(() => fetchNAS(), 60000)">
      <div class="card-header">
        <span class="drag-handle" x-show="editMode">⠿</span>
        <span class="card-icon">💾</span>
        <h2 class="card-title">TrueNAS</h2>
      </div>
      <div class="card-body">
        <template x-if="nas.loading">
          <div class="skeleton-group">
            <div class="skeleton skeleton-md"></div>
            <div class="skeleton skeleton-md"></div>
          </div>
        </template>
        <template x-if="!nas.loading && nas.data">
          <div class="truenas-content">
            <div class="truenas-section">
              <div class="truenas-section-title">Pools</div>
              <template x-for="pool in nas.data.pools" :key="pool.name">
                <div class="truenas-pool">
                  <div class="truenas-pool-header">
                    <span class="truenas-pool-name" x-text="pool.name"></span>
                    <span class="truenas-badge" :class="pool.status === 'ONLINE' ? 'badge-green' : 'badge-red'" x-text="pool.status"></span>
                  </div>
                  <div class="truenas-bar-wrap">
                    <div class="truenas-bar">
                      <div class="truenas-bar-fill" :style="'width:' + pool.usedPercent + '%'" :class="pool.usedPercent > 85 ? 'bar-red' : pool.usedPercent > 70 ? 'bar-yellow' : ''"></div>
                    </div>
                    <span class="truenas-percent" x-text="pool.usedPercent + '%'"></span>
                  </div>
                </div>
              </template>
            </div>
            <div class="truenas-section" x-show="nas.data.apps && nas.data.apps.length > 0">
              <div class="truenas-section-title">Apps</div>
              <div class="truenas-apps-grid">
                <template x-for="app in nas.data.apps" :key="app.name">
                  <div class="truenas-app">
                    <span class="dot" :class="app.state?.toUpperCase() === 'RUNNING' ? 'dot-green' : 'dot-red'"></span>
                    <span class="truenas-app-name" x-text="app.name"></span>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </template>
        <template x-if="!nas.loading && nas.error">
          <div class="error-state"><p x-text="nas.error"></p></div>
        </template>
      </div>
    </section>

    <!-- Media Center -->
    <section class="card media-card" data-widget-id="media" x-data="mediaCenter()" x-init="init()">
      <div class="card-header">
        <span class="drag-handle" x-show="editMode">⠿</span>
        <span class="card-icon">🎬</span>
        <h2 class="card-title">Media Center</h2>
        <div class="media-tabs">
          <button class="media-tab" :class="tab === 'continue' && 'active'" @click="tab = 'continue'">Continue</button>
          <button class="media-tab" :class="tab === 'recent' && 'active'" @click="tab = 'recent'">Recent</button>
          <button class="media-tab" :class="tab === 'playing' && 'active'" @click="tab = 'playing'">
            Now Playing
            <span class="now-playing-dot" x-show="playing.data.length > 0"></span>
          </button>
        </div>
      </div>
      <div class="card-body">

        <!-- Continue Watching -->
        <div x-show="tab === 'continue'">
          <template x-if="continueW.loading">
            <div class="media-scroll">
              <template x-for="i in 4" :key="i"><div class="skeleton media-skeleton-poster"></div></template>
            </div>
          </template>
          <template x-if="!continueW.loading && continueW.data.length === 0">
            <div class="media-empty">Nothing in progress</div>
          </template>
          <template x-if="!continueW.loading && continueW.data.length > 0">
            <div class="media-scroll">
              <template x-for="item in continueW.data.slice(0, 8)" :key="item.id">
                <div class="media-poster-card">
                  <div class="media-poster-img-wrap">
                    <img :src="item.imagePrimary || ''" alt="" class="media-poster-img" onerror="this.parentElement.classList.add('no-img')">
                    <div class="media-poster-no-img" x-text="item.name?.charAt(0) || '?'"></div>
                    <div class="media-poster-overlay">
                      <span x-text="item.seriesName || item.name"></span>
                    </div>
                  </div>
                  <div class="media-progress-bar">
                    <div class="media-progress-fill" :style="'width:' + item.progressPercent + '%'"></div>
                  </div>
                  <div class="media-poster-title" x-text="item.seriesName || item.name"></div>
                  <div class="media-poster-sub" x-show="item.episodeTitle" x-text="item.episodeTitle"></div>
                </div>
              </template>
            </div>
          </template>
        </div>

        <!-- Recently Added -->
        <div x-show="tab === 'recent'">
          <template x-if="recent.loading">
            <div class="media-scroll">
              <template x-for="i in 4" :key="i"><div class="skeleton media-skeleton-poster"></div></template>
            </div>
          </template>
          <template x-if="!recent.loading && recent.data.length === 0">
            <div class="media-empty">No recent additions</div>
          </template>
          <template x-if="!recent.loading && recent.data.length > 0">
            <div class="media-scroll">
              <template x-for="item in recent.data.slice(0, 10)" :key="item.id">
                <div class="media-poster-card">
                  <div class="media-poster-img-wrap">
                    <img :src="item.imagePrimary || ''" alt="" class="media-poster-img" onerror="this.parentElement.classList.add('no-img')">
                    <div class="media-poster-no-img" x-text="item.name?.charAt(0) || '?'"></div>
                    <div class="media-poster-overlay">
                      <span x-text="item.name"></span>
                    </div>
                  </div>
                  <div class="media-poster-title" x-text="item.name"></div>
                  <div class="media-poster-sub" x-text="item.dateCreated ? timeAgoMedia(item.dateCreated) : ''"></div>
                </div>
              </template>
            </div>
          </template>
        </div>

        <!-- Now Playing -->
        <div x-show="tab === 'playing'">
          <template x-if="playing.loading">
            <div class="skeleton-group">
              <template x-for="i in 2" :key="i"><div class="skeleton skeleton-md"></div></template>
            </div>
          </template>
          <template x-if="!playing.loading && playing.data.length === 0">
            <div class="media-empty">Nothing playing right now</div>
          </template>
          <template x-if="!playing.loading && playing.data.length > 0">
            <div class="media-playing-list">
              <template x-for="(s, i) in playing.data" :key="i">
                <div class="media-playing-item">
                  <template x-if="s.posterId">
                    <img :src="'/api/media/poster/' + s.posterId" class="media-playing-poster" onerror="this.style.display='none'">
                  </template>
                  <template x-if="!s.posterId">
                    <div class="media-playing-avatar" x-text="s.user?.charAt(0) || '?'"></div>
                  </template>
                  <div class="media-playing-info">
                    <div class="media-playing-title">
                      <span x-text="s.title"></span>
                      <span x-show="s.year" class="media-playing-year" x-text="'(' + s.year + ')'"></span>
                      <span x-show="s.isPaused" class="media-playing-paused">⏸ Paused</span>
                    </div>
                    <div class="media-playing-meta">
                      <span class="media-playing-user">👤 <span x-text="s.user"></span></span>
                      <span class="media-playing-sep">·</span>
                      <span>📱 <span x-text="s.player"></span></span>
                      <span x-show="s.client" class="media-playing-client" x-text="s.client"></span>
                    </div>
                    <div class="media-playing-tech">
                      <span class="media-playing-method" :class="s.playMethod === 'DirectPlay' ? 'method-direct' : s.playMethod === 'DirectStream' ? 'method-stream' : 'method-transcode'"
                        x-text="s.playMethod === 'DirectPlay' ? '⚡ Direct Play' : s.playMethod === 'DirectStream' ? '📡 Direct Stream' : '🔄 Transcode'"></span>
                      <span x-show="s.videoCodec" class="media-playing-codec" x-text="'🎬 ' + (s.videoCodec?.toUpperCase() || '') + (s.resolution ? ' ' + s.resolution : '')"></span>
                      <span x-show="s.container" class="media-playing-container" x-text="'📦 ' + (s.container || '')"></span>
                    </div>
                    <div class="media-playing-tech" x-show="s.audioCodec || s.bitrate">
                      <span x-show="s.audioCodec" class="media-playing-audio" x-text="'🔊 ' + (s.audioCodec || '')"></span>
                      <span x-show="s.bitrate" class="media-playing-bitrate" x-text="'📶 ' + s.bitrate"></span>
                      <span x-show="s.location" class="media-playing-location" x-text="'🔒 ' + (s.location || '') + (s.ip ? ' ' + s.ip : '')"></span>
                    </div>
                    <div class="media-playing-time">
                      <span x-text="s.timeDisplay || ''"></span>
                      <span class="media-playing-pct" x-text="s.progress + '%'"></span>
                    </div>
                    <div class="media-progress-bar playing-progress">
                      <div class="media-progress-fill" :style="'width:' + s.progress + '%'" :class="s.isPaused ? 'paused' : ''"></div>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </template>
        </div>

      </div>
    </section>

    <!-- Alfred Apps -->
    <section class="card alfred-apps-card" data-widget-id="alfred-apps" x-data="alfredApps()" x-init="init()">
      <div class="card-header">
        <span class="drag-handle" x-show="editMode">⠿</span>
        <span class="card-icon">🤖</span>
        <h2 class="card-title">Alfred Apps</h2>
        <span class="services-count" x-show="!loading">
          <span class="dot dot-green"></span>
          <span x-text="apps.filter(a => a.status === 'up').length + '/' + apps.length"></span>
        </span>
      </div>
      <div class="card-body">
        <template x-if="loading">
          <div class="skeleton-group">
            <template x-for="i in 4" :key="i"><div class="skeleton skeleton-sm"></div></template>
          </div>
        </template>
        <template x-if="!loading && error">
          <div class="error-state">
            <p x-text="error"></p>
            <button @click="fetchStatus()" class="retry-btn">Retry</button>
          </div>
        </template>
        <template x-if="!loading && !error">
          <div class="alfred-apps-list">
            <template x-for="app in apps" :key="app.id">
              <div class="alfred-app-row">
                <span class="dot" :class="app.status === 'up' ? 'dot-green' : 'dot-red'"></span>
                <template x-if="app.status === 'up'">
                  <a :href="'http://192.168.0.139:' + app.port" target="_blank" rel="noopener" class="alfred-app-name alfred-app-link" x-text="app.name"></a>
                </template>
                <template x-if="app.status !== 'up'">
                  <span class="alfred-app-name" x-text="app.name"></span>
                </template>
                <span class="alfred-app-port" x-text="':' + app.port"></span>
                <span class="alfred-app-uptime" x-text="app.status === 'up' ? formatUptime(app.uptime) : '—'"></span>
                <button
                  class="alfred-app-btn"
                  :class="app.status === 'up' ? 'btn-stop' : 'btn-start'"
                  :disabled="app._busy"
                  @click="toggle(app)"
                  x-text="app.status === 'up' ? '⏹' : '▶'"
                  :title="app.status === 'up' ? 'Stop' : 'Start'"
                ></button>
              </div>
            </template>
          </div>
        </template>
      </div>
    </section>

  </main>

  <!-- Add Bookmark Modal -->
  <div class="modal-overlay" x-show="showBookmarkModal" x-transition.opacity @click.self="showBookmarkModal = false" style="display:none;">
    <div class="modal" @click.stop>
      <h3 class="modal-title">Add Bookmark</h3>
      <form @submit.prevent="addBookmark()">
        <input type="text" x-model="newBookmark.name" placeholder="Name" class="modal-input" required>
        <input type="url" x-model="newBookmark.url" placeholder="https://..." class="modal-input" required>
        <div class="modal-actions">
          <button type="button" @click="showBookmarkModal = false" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">Add</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Add Stock Modal -->
  <div class="modal-overlay" x-show="showStockModal" x-transition.opacity @click.self="showStockModal = false" style="display:none;">
    <div class="modal" @click.stop>
      <h3 class="modal-title">Add Stock Symbol</h3>
      <form @submit.prevent="addStock()">
        <input type="text" x-model="newStockSymbol" placeholder="e.g. AAPL" class="modal-input" required>
        <div class="modal-actions">
          <button type="button" @click="showStockModal = false" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">Add</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Add Service Modal -->
  <div class="modal-overlay" x-show="showServiceModal" x-transition.opacity @click.self="showServiceModal = false" style="display:none;">
    <div class="modal" @click.stop>
      <h3 class="modal-title">Add Service</h3>
      <form @submit.prevent="addService()">
        <input type="text" x-model="newService.name" placeholder="Service name" class="modal-input" required>
        <input type="url" x-model="newService.url" placeholder="http://192.168.0..." class="modal-input" required>
        <input type="text" x-model="newService.icon" placeholder="Icon emoji (e.g. 🔗)" class="modal-input" maxlength="4">
        <div class="modal-actions">
          <button type="button" @click="showServiceModal = false" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">Add</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    function dashboard() {
      return {
        searchEngine: 'google',
        editMode: false,
        showBookmarkModal: false,
        showStockModal: false,
        showServiceModal: false,
        newBookmark: { name: '', url: '' },
        newStockSymbol: '',
        newService: { name: '', url: '', icon: '' },
        _sortableWidgets: null,
        _sortableBookmarks: null,
        _sortableServices: null,

        weather: { loading: true, data: null, error: null },
        bookmarks: { loading: true, data: [] },
        rss: { loading: true, data: [], error: null },
        services: { loading: true, data: [] },
        stocks: { loading: true, data: [] },

        init() {
          this.fetchWeather();
          this.fetchBookmarks();
          this.fetchRSS();
          this.fetchServices();
          this.fetchStocks();
          this.applyWidgetOrder();

          // Auto-refresh intervals
          setInterval(() => this.fetchWeather(), 30 * 60 * 1000);    // 30 min
          setInterval(() => this.fetchRSS(), 10 * 60 * 1000);        // 10 min
          setInterval(() => this.fetchServices(), 30 * 1000);          // 30 sec
          setInterval(() => this.fetchStocks(), 15 * 60 * 1000);      // 15 min
        },

        toggleSearchEngine() {
          this.searchEngine = this.searchEngine === 'google' ? 'gemini' : 'google';
        },

        handleSearch(e) {
          if (this.searchEngine === 'gemini') {
            e.preventDefault();
            const query = this.$refs.searchInput.value;
            if (query) {
              window.open('https://gemini.google.com/app?q=' + encodeURIComponent(query), '_blank');
            }
          }
        },

        // === Widget Order ===
        async applyWidgetOrder() {
          try {
            const resp = await fetch('/api/widget-order');
            if (!resp.ok) return;
            const order = await resp.json();
            if (!order.length) return;
            const grid = document.querySelector('.dashboard-grid');
            if (!grid) return;
            const sorted = order.sort((a, b) => a.sort_order - b.sort_order);
            for (const item of sorted) {
              const el = grid.querySelector(`[data-widget-id="${item.widget_id}"]`);
              if (el) grid.appendChild(el);
            }
          } catch (e) {
            console.error('Widget order error:', e);
          }
        },

        async saveWidgetOrder() {
          const grid = document.querySelector('.dashboard-grid');
          const cards = grid.querySelectorAll('[data-widget-id]');
          const items = Array.from(cards).map((el, i) => ({
            widget_id: el.dataset.widgetId,
            sort_order: i,
          }));
          try {
            await fetch('/api/widget-order', {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(items),
            });
          } catch (e) {
            console.error('Save widget order error:', e);
          }
        },

        // === Edit Mode ===
        enterEditMode() {
          this.editMode = true;
          this.$nextTick(() => this.initSortables());
        },

        exitEditMode() {
          this.editMode = false;
          this.destroySortables();
        },

        initSortables() {
          const self = this;
          // Widget drag
          const grid = document.querySelector('.dashboard-grid');
          if (grid) {
            this._sortableWidgets = new Sortable(grid, {
              animation: 250,
              handle: '.drag-handle',
              ghostClass: 'sortable-ghost',
              chosenClass: 'sortable-chosen',
              dragClass: 'sortable-drag',
              onEnd() { self.saveWidgetOrder(); },
            });
          }
          // Bookmark drag
          setTimeout(() => {
            const bmGrid = this.$refs.bookmarksGrid;
            if (bmGrid) {
              this._sortableBookmarks = new Sortable(bmGrid, {
                animation: 250,
                ghostClass: 'sortable-ghost',
                chosenClass: 'sortable-chosen',
                onEnd() { self.saveBookmarkOrder(bmGrid); },
              });
            }
            // Services drag
            const svcGrid = this.$refs.servicesGrid;
            if (svcGrid) {
              this._sortableServices = new Sortable(svcGrid, {
                animation: 250,
                ghostClass: 'sortable-ghost',
                chosenClass: 'sortable-chosen',
                onEnd() { self.saveServiceOrder(svcGrid); },
              });
            }
          }, 100);
        },

        destroySortables() {
          if (this._sortableWidgets) { this._sortableWidgets.destroy(); this._sortableWidgets = null; }
          if (this._sortableBookmarks) { this._sortableBookmarks.destroy(); this._sortableBookmarks = null; }
          if (this._sortableServices) { this._sortableServices.destroy(); this._sortableServices = null; }
        },

        async saveBookmarkOrder(grid) {
          const items = Array.from(grid.children)
            .filter(el => el.dataset.id)
            .map((el, i) => ({ id: Number(el.dataset.id), sort_order: i }));
          try {
            await fetch('/api/bookmarks/reorder', {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(items),
            });
            this.fetchBookmarks();
          } catch (e) {
            console.error('Bookmark reorder error:', e);
          }
        },

        async saveServiceOrder(grid) {
          const items = Array.from(grid.children)
            .filter(el => el.dataset.id)
            .map((el, i) => ({ id: Number(el.dataset.id), sort_order: i }));
          try {
            await fetch('/api/services/reorder', {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(items),
            });
          } catch (e) {
            console.error('Service reorder error:', e);
          }
        },

        // === Service CRUD ===
        async addService() {
          try {
            const resp = await fetch('/api/services', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.newService),
            });
            if (resp.ok) {
              this.newService = { name: '', url: '', icon: '' };
              this.showServiceModal = false;
              this.fetchServices();
            }
          } catch (err) {
            console.error('Add service error:', err);
          }
        },

        async deleteService(id) {
          try {
            await fetch('/api/services/' + id, { method: 'DELETE' });
            this.services.data = this.services.data.filter(s => s.id !== id);
          } catch (err) {
            console.error('Delete service error:', err);
          }
        },

        async fetchWeather() {
          try {
            const resp = await fetch('/api/weather');
            if (!resp.ok) throw new Error('Failed to load');
            this.weather.data = await resp.json();
            this.weather.error = null;
          } catch (err) {
            this.weather.error = err.message;
          } finally {
            this.weather.loading = false;
          }
        },

        async fetchBookmarks() {
          try {
            const resp = await fetch('/api/bookmarks');
            this.bookmarks.data = await resp.json();
          } catch (err) {
            console.error('Bookmarks error:', err);
          } finally {
            this.bookmarks.loading = false;
          }
        },

        async addBookmark() {
          try {
            const resp = await fetch('/api/bookmarks', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.newBookmark),
            });
            if (resp.ok) {
              const bm = await resp.json();
              this.bookmarks.data.push(bm);
              this.newBookmark = { name: '', url: '' };
              this.showBookmarkModal = false;
            }
          } catch (err) {
            console.error('Add bookmark error:', err);
          }
        },

        async deleteBookmark(id) {
          try {
            await fetch('/api/bookmarks/' + id, { method: 'DELETE' });
            this.bookmarks.data = this.bookmarks.data.filter(b => b.id !== id);
          } catch (err) {
            console.error('Delete bookmark error:', err);
          }
        },

        async fetchRSS() {
          try {
            const resp = await fetch('/api/rss');
            if (!resp.ok) throw new Error('Failed to load');
            this.rss.data = await resp.json();
            this.rss.error = null;
          } catch (err) {
            this.rss.error = err.message;
          } finally {
            this.rss.loading = false;
          }
        },

        async fetchServices() {
          try {
            const resp = await fetch('/api/services');
            this.services.data = await resp.json();
          } catch (err) {
            console.error('Services error:', err);
          } finally {
            this.services.loading = false;
          }
        },

        async fetchStocks() {
          try {
            const resp = await fetch('/api/stocks');
            if (!resp.ok) throw new Error('Failed to load');
            this.stocks.data = await resp.json();
          } catch (err) {
            console.error('Stocks error:', err);
          } finally {
            this.stocks.loading = false;
          }
        },

        async addStock() {
          try {
            const resp = await fetch('/api/stocks', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ symbol: this.newStockSymbol }),
            });
            if (resp.ok) {
              this.newStockSymbol = '';
              this.showStockModal = false;
              this.stocks.loading = true;
              this.fetchStocks();
            }
          } catch (err) {
            console.error('Add stock error:', err);
          }
        },

        async deleteStock(symbol) {
          try {
            await fetch('/api/stocks/' + encodeURIComponent(symbol), { method: 'DELETE' });
            this.stocks.data = this.stocks.data.filter(s => s.symbol !== symbol);
          } catch (err) {
            console.error('Delete stock error:', err);
          }
        },

        getWeatherSVG(code, size = 36) {
          const s = size;
          const sun = `<svg width="${s}" height="${s}" viewBox="0 0 36 36"><circle cx="18" cy="18" r="8" fill="#f1c40f"/><g stroke="#f1c40f" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="2" x2="18" y2="6"/><line x1="18" y1="30" x2="18" y2="34"/><line x1="2" y1="18" x2="6" y2="18"/><line x1="30" y1="18" x2="34" y2="18"/><line x1="6.7" y1="6.7" x2="9.5" y2="9.5"/><line x1="26.5" y1="26.5" x2="29.3" y2="29.3"/><line x1="6.7" y1="29.3" x2="9.5" y2="26.5"/><line x1="26.5" y1="9.5" x2="29.3" y2="6.7"/></g></svg>`;
          const partCloud = `<svg width="${s}" height="${s}" viewBox="0 0 36 36"><circle cx="14" cy="12" r="6" fill="#f1c40f"/><g stroke="#f1c40f" stroke-width="2" stroke-linecap="round"><line x1="14" y1="2" x2="14" y2="4"/><line x1="5" y1="12" x2="3" y2="12"/><line x1="7.4" y1="5.4" x2="5.9" y2="3.9"/><line x1="20.6" y1="5.4" x2="22.1" y2="3.9"/><line x1="23" y1="12" x2="25" y2="12"/></g><path d="M10 28 Q10 22 16 22 Q16 17 22 17 Q28 17 28 22 Q32 22 32 26 Q32 28 30 28 Z" fill="#a0a0b0"/></svg>`;
          const cloud = `<svg width="${s}" height="${s}" viewBox="0 0 36 36"><path d="M8 28 Q8 22 14 22 Q14 16 21 16 Q28 16 28 22 Q33 22 33 26 Q33 28 31 28 Z" fill="#8a8a9a"/></svg>`;
          const rain = `<svg width="${s}" height="${s}" viewBox="0 0 36 36"><path d="M8 22 Q8 16 14 16 Q14 10 21 10 Q28 10 28 16 Q33 16 33 20 Q33 22 31 22 Z" fill="#8a8a9a"/><g stroke="#5dade2" stroke-width="2" stroke-linecap="round"><line x1="12" y1="25" x2="10" y2="31"/><line x1="18" y1="25" x2="16" y2="31"/><line x1="24" y1="25" x2="22" y2="31"/></g></svg>`;
          const storm = `<svg width="${s}" height="${s}" viewBox="0 0 36 36"><path d="M8 20 Q8 14 14 14 Q14 8 21 8 Q28 8 28 14 Q33 14 33 18 Q33 20 31 20 Z" fill="#7f8c8d"/><polygon points="19,20 15,28 19,28 16,34 24,25 20,25 23,20" fill="#f1c40f"/></svg>`;
          if (code === 0) return sun;
          if (code <= 3) return partCloud;
          if (code <= 48) return cloud;
          if (code <= 82) return rain;
          if (code <= 86) return rain;
          if (code >= 95) return storm;
          return partCloud;
        },

        formatDay(dateStr) {
          const d = new Date(dateStr + 'T00:00:00');
          return d.toLocaleDateString('en', { weekday: 'short' });
        },

        sparklinePath(prices, width, height) {
          if (!prices || prices.length < 2) return '';
          const min = Math.min(...prices);
          const max = Math.max(...prices);
          const range = max - min || 1;
          const step = width / (prices.length - 1);
          return prices.map((p, i) => {
            const x = (i * step).toFixed(1);
            const y = (height - ((p - min) / range) * (height - 4) - 2).toFixed(1);
            return x + ',' + y;
          }).join(' ');
        },

        timeAgo(dateStr) {
          if (!dateStr) return '';
          const now = new Date();
          const then = new Date(dateStr);
          const diff = Math.floor((now - then) / 1000);
          if (diff < 60) return 'just now';
          if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
          if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
          return Math.floor(diff / 86400) + 'd ago';
        },
      };
    }

    function mediaCenter() {
      return {
        tab: 'continue',
        continueW: { loading: true, data: [] },
        recent: { loading: true, data: [] },
        playing: { loading: true, data: [] },

        init() {
          this.fetchContinue();
          this.fetchRecent();
          this.fetchPlaying();
          setInterval(() => this.fetchContinue(), 60 * 1000);
          setInterval(() => this.fetchRecent(), 60 * 1000);
          setInterval(() => this.fetchPlaying(), 15 * 1000);
        },

        async fetchContinue() {
          try {
            const resp = await fetch('/api/media/continue');
            if (resp.ok) this.continueW.data = await resp.json();
          } catch (e) { console.error('Media continue error:', e); }
          finally { this.continueW.loading = false; }
        },

        async fetchRecent() {
          try {
            const resp = await fetch('/api/media/recent');
            if (resp.ok) this.recent.data = await resp.json();
          } catch (e) { console.error('Media recent error:', e); }
          finally { this.recent.loading = false; }
        },

        async fetchPlaying() {
          try {
            const resp = await fetch('/api/media/playing');
            if (resp.ok) this.playing.data = await resp.json();
          } catch (e) { console.error('Media playing error:', e); }
          finally { this.playing.loading = false; }
        },

        timeAgoMedia(dateStr) {
          if (!dateStr) return '';
          const now = new Date();
          const then = new Date(dateStr);
          const diff = Math.floor((now - then) / 1000);
          if (diff < 60) return 'just now';
          if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
          if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
          return Math.floor(diff / 86400) + 'd ago';
        },
      };
    }

    function clock() {
      return {
        time: '',
        date: '',
        startClock() {
          const update = () => {
            const now = new Date();
            this.time = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: 'Asia/Jerusalem' });
            this.date = now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric', timeZone: 'Asia/Jerusalem' });
          };
          update();
          setInterval(update, 1000);
        },
      };
    }
    function alfredApps() {
      return {
        loading: true,
        error: null,
        apps: [],

        init() {
          this.fetchStatus();
          setInterval(() => this.fetchStatus(), 30 * 1000);
        },

        async fetchStatus() {
          try {
            const resp = await fetch('/api/alfred-apps/status');
            if (!resp.ok) throw new Error('Failed to load');
            this.apps = (await resp.json()).map(a => ({ ...a, _busy: false }));
            this.error = null;
          } catch (err) {
            this.error = err.message;
          } finally {
            this.loading = false;
          }
        },

        async toggle(app) {
          const action = app.status === 'up' ? 'stop' : 'start';
          app._busy = true;
          try {
            await fetch(`/api/alfred-apps/${app.id}/${action}`, { method: 'POST' });
            await this.fetchStatus();
          } catch (err) {
            console.error('Alfred Apps toggle error:', err);
          } finally {
            app._busy = false;
          }
        },

        formatUptime(ms) {
          if (!ms || ms < 0) return '—';
          const totalSeconds = Math.floor(ms / 1000);
          const d = Math.floor(totalSeconds / 86400);
          const h = Math.floor((totalSeconds % 86400) / 3600);
          const m = Math.floor((totalSeconds % 3600) / 60);
          const s = Math.floor(totalSeconds % 60);
          if (d > 0) return d + 'd ' + h + 'h';
          if (h > 0) return h + 'h ' + m + 'm';
          return m + 'm ' + s + 's';
        },
      };
    }
  </script>
</body>
